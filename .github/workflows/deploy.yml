name: Build, Prerender & Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Puppeteer's bundled Chromium needs these system libraries.
      # ubuntu-latest (24.04) uses libasound2t64 instead of libasound2.
      - name: Install Chrome system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnspr4 \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64

      - name: Install npm dependencies
        run: npm ci

      - name: Vite build
        run: npm run build:vite

      - name: Prerender with Puppeteer
        run: node prerender.mjs

      - name: Verify prerender output
        run: |
          echo "=== HTML files in dist/ ==="
          find dist -name "index.html" | sort
          echo ""
          echo "=== Root page has rendered content? ==="
          grep -c 'id="root"><' dist/index.html && echo "✅ root has children" || echo "⚠️  root may be empty"

      # Structure dist/ into Vercel's prebuilt output format.
      # "handle: filesystem" tells Vercel CDN to serve prerendered HTML
      # files first, then fall back to index.html for unknown routes (SPA).
      - name: Create Vercel prebuilt output
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/

          cat > .vercel/output/config.json << 'VERCEL_CONFIG'
          {
            "version": 3,
            "routes": [
              {
                "src": "/assets/(.*)",
                "headers": { "cache-control": "public, max-age=31536000, immutable" },
                "dest": "/assets/$1"
              },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          VERCEL_CONFIG

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          echo '{"orgId":"${{ secrets.VERCEL_ORG_ID }}","projectId":"${{ secrets.VERCEL_PROJECT_ID }}"}' \
            > .vercel/project.json

      - name: Deploy to Vercel (prebuilt, no rebuild)
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
